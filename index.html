                padding: 16px;
                border-radius: 8px;
                border: 1px solid #e1e4e8;
                gap: 12px;

            .item-row > .remove-btn {

                font-weight: bold;

    function calculateGrandTotal() {
        let total = 0;
        const subtotals = document.querySelectorAll('.subtotal-input');
        subtotals.forEach(input => {
            const val = parseInt(input.value.replace(/,/g, '')) || 0;
            total += val;
        });
        grandTotalElement.textContent = formatCurrency(total);
    }

        row.className = 'item-row';

        uniqueColors.forEach(color => {
            colorOptions += `<option value="${color}">${color}</option>`;
        });

                <select class="color-select">${colorOptions}</select>

            <div class="form-group large">

            </div>

            </div>
            <div class="form-group">

        const qtyInput = row.querySelector('.qty-input');
        const subtotalInput = row.querySelector('.subtotal-input');
        const removeBtn = row.querySelector('.remove-btn');

        function resetRowFields() {
            skuInput.value = '';
            priceInput.value = '';
            qtyInput.value = '1';
            qtyInput.disabled = true;
            subtotalInput.value = '';
            calculateGrandTotal();
        }

        colorSelect.addEventListener('change', function() {
            const selectedColor = this.value;
            productSelect.innerHTML = '<option value="">請選擇商品...</option>';
            resetRowFields();

            if (selectedColor) {
                productSelect.disabled = false;
                const filteredProducts = database.filter(item => item.color === selectedColor);
                filteredProducts.forEach(product => {
                    const option = document.createElement('option');
                    option.value = product.sku;
                    option.textContent = product.name;
                    productSelect.appendChild(option);
                });
            } else {
                productSelect.disabled = true;
                productSelect.innerHTML = '<option value="">請先選擇顏色...</option>';
            }
        });

        productSelect.addEventListener('change', function() {
            const selectedSku = this.value;
            if (selectedSku) {
                const product = database.find(item => item.sku === selectedSku);
                skuInput.value = product.sku;
                priceInput.value = formatCurrency(product.price);
                qtyInput.disabled = false;
                qtyInput.value = 1;
                
                const subtotal = product.price * 1;
                subtotalInput.value = formatCurrency(subtotal);
                calculateGrandTotal();
            } else {
                resetRowFields();
            }
        });

        qtyInput.addEventListener('input', function() {
            const selectedSku = productSelect.value;
            if (selectedSku) {
                const product = database.find(item => item.sku === selectedSku);
                const qty = parseInt(this.value) || 0;
                const subtotal = product.price * qty;
                subtotalInput.value = formatCurrency(subtotal);
                calculateGrandTotal();
            }
        });

        removeBtn.addEventListener('click', function() {
            if (document.querySelectorAll('.item-row').length > 1) {
                row.remove();
                calculateGrandTotal();

                colorSelect.dispatchEvent(new Event('change'));
            }
        });

        orderLinesContainer.appendChild(row);
    }

    addBtn.addEventListener('click', createRow);
    createRow();

</script>

</body>
</html>
