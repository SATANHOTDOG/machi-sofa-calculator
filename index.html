    const subtotalInput = document.getElementById('subtotalInput');
    const grandTotal = document.getElementById('grandTotal');

    function formatCurrency(num) {
        return num.toLocaleString('en-US');
    }

    function initColors() {
        const colors = [...new Set(database.map(item => item.color))];
        colors.forEach(color => {
            const option = document.createElement('option');
            option.value = color;
            option.textContent = color;
            colorSelect.appendChild(option);
        });
    }

    colorSelect.addEventListener('change', function() {
        const selectedColor = this.value;
        productSelect.innerHTML = '<option value="">請選擇商品...</option>';
        
        resetFields();

        if (selectedColor) {
            productSelect.disabled = false;
            const filteredProducts = database.filter(item => item.color === selectedColor);
            filteredProducts.forEach(product => {
                const option = document.createElement('option');
                option.value = product.sku;
                option.textContent = product.name;
                productSelect.appendChild(option);
            });
        } else {
            productSelect.disabled = true;
            productSelect.innerHTML = '<option value="">請先選擇顏色...</option>';
        }
    });

    productSelect.addEventListener('change', function() {
        const selectedSku = this.value;
        if (selectedSku) {
            const product = database.find(item => item.sku === selectedSku);
            skuInput.value = product.sku;
            priceInput.value = formatCurrency(product.price);
            qtyInput.disabled = false;
            qtyInput.value = 1;
            updateSubtotal(product.price, 1);
        } else {
            resetFields();
        }
    });

    qtyInput.addEventListener('input', function() {
        const selectedSku = productSelect.value;
        if (selectedSku) {
            const product = database.find(item => item.sku === selectedSku);
            const qty = parseInt(this.value) || 0;
            updateSubtotal(product.price, qty);
        }
    });

    function updateSubtotal(price, qty) {
        const subtotal = price * qty;
        subtotalInput.value = formatCurrency(subtotal);
        grandTotal.textContent = formatCurrency(subtotal);
    }

    function resetFields() {
        skuInput.value = '';
        priceInput.value = '';
        qtyInput.value = '1';
        qtyInput.disabled = true;
        subtotalInput.value = '';
        grandTotal.textContent = '0';
    }

    initColors();
